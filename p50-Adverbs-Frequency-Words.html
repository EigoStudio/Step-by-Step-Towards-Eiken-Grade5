<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>英検5級：現在形の副詞・前置詞フレーズ</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff9c4;
            --header-gray: #455a64;
            --accent-yellow: #fbc02d;
            --text-dark: #263238;
            --white: #ffffff;
            --error-red: #ff5252;
            --success-green: #4caf50;
            --base-font: 'Andika', "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
        }

        body {
            font-family: var(--base-font);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-gray);
            color: var(--white);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 650px;
            width: 90%;
            margin: 20px 0;
            background: var(--white);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
            border: 5px solid var(--accent-yellow);
        }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .menu-btn {
            background: var(--white);
            border: 4px solid var(--header-gray);
            padding: 25px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-btn:hover { background: #eee; transform: translateY(-3px); }
        .menu-btn span { display: block; font-size: 0.9rem; color: #666; margin-top: 10px; }

        .progress-bar { font-size: 1.1rem; color: var(--header-gray); margin-bottom: 15px; font-weight: bold; }
        
        .word-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px 0 30px 0;
            min-height: 140px;
        }

        .word-display-p1 { font-size: 3rem; font-weight: 700; color: var(--header-gray); flex: 1; line-height: 1.2; }
        .word-display-p2 { font-size: 1.5rem; font-weight: 700; color: var(--header-gray); flex: 1; text-align: left; padding: 0 10px; line-height: 1.4; }

        .speaker-btn {
            background: #fff3e0;
            border: 2px solid #ff9800;
            color: #ff9800;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #e65100;
            flex-shrink: 0;
        }
        .speaker-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #e65100; }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .choice-btn-base {
            background: var(--white);
            border: 3px solid var(--header-gray);
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--header-gray);
            font-family: var(--base-font);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            line-height: 1.3;
            min-height: 100px;
        }
        .choice-btn-p1 { font-size: 1.4rem; }
        .choice-btn-p2 { font-size: 1.05rem; }

        .choice-btn-base:hover { background-color: #eceff1; transform: scale(1.02); }
        .choice-btn-base.wrong { background-color: #ffebee; border-color: var(--error-red); color: var(--error-red); animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        #quiz-screen, #result-screen { display: none; }
        .score-num { font-size: 4rem; color: var(--header-gray); font-weight: 700; }
        .mistake-list { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #cfd8dc; }
        .mistake-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }

        .action-btn { 
            background-color: var(--header-gray); color: white; border: none; padding: 15px; border-radius: 40px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">現在形の副詞・前置詞フレーズ</h1>
</header>

<div class="container" id="menu-screen">
    <h2 style="margin-bottom:10px;">学習を始めよう！</h2>
    <div class="menu-grid">
        <button class="menu-btn" onclick="startQuiz(1)">
            Part 1：ことば編
            <span>フレーズの和訳をマスター！</span>
        </button>
        <button class="menu-btn" onclick="startQuiz(2)">
            Part 2：ルール編
            <span>使い方のルールをマスター！</span>
        </button>
    </div>
</div>

<div class="container" id="quiz-screen">
    <div class="progress-bar" id="progress">1 / 20</div>
    <div class="word-area">
        <div id="word-text"></div>
        <button class="speaker-btn" id="speaker-btn" onclick="speakCurrentWord()">🔊</button>
    </div>
    <div class="choices-grid" id="choices-container"></div>
    <div id="feedback" style="margin-top:20px; height: 1.2em; font-weight: bold; font-size: 1.3rem;"></div>
</div>

<div class="container" id="result-screen">
    <h2 id="result-title">Part終了！</h2>
    <div style="font-size: 1.2rem;">一発正解数：<span class="score-num" id="final-score">0</span> / <span id="total-questions">0</span></div>
    <div id="mistake-container" style="display:none;">
        <h3 style="color: var(--header-gray); margin-top:25px;">もういちど 確認！</h3>
        <div class="mistake-list" id="mistake-list"></div>
    </div>
    <button class="action-btn" onclick="sendEmail()">Tamaki先生に報告する</button>
    <button class="action-btn" style="background-color: #90a4ae;" onclick="location.reload()">メニューに戻る</button>
</div>

<script>
let currentPart = 1;
let quizQueue = [];
let currentIndex = 0;
let firstTryCorrectCount = 0;
let isFirstTry = true;
let mistakes = [];

const part1Data = [
    {w:"always", a:"いつも", c:["たいてい","よく","ときどき"]},
    {w:"usually", a:"たいてい", c:["いつも","ときどき","よく"]},
    {w:"often", a:"よく、しばしば", c:["いつも","ときどき","たまに"]},
    {w:"sometimes", a:"ときどき", c:["たいてい","いつも","まったく～ない"]},
    {w:"every day", a:"<ruby>毎日<rt>まいにち</rt></ruby>", c:["<ruby>毎週<rt>まいしゅう</rt></ruby>","<ruby>毎朝<rt>まいあさ</rt></ruby>","<ruby>毎晩<rt>まいばん</rt></ruby>"]},
    {w:"on Sundays", a:"<ruby>毎週日曜日<rt>まいしゅうにちようび</rt></ruby>に", c:["<ruby>今週<rt>こんしゅう</rt></ruby>の日曜","<ruby>毎週土曜日<rt>まいしゅうどようび</rt></ruby>","日曜の朝"]},
    {w:"every Sunday", a:"<ruby>毎週日曜日<rt>まいしゅうにちようび</rt></ruby>", c:["<ruby>今日<rt>きょう</rt></ruby>の日曜","<ruby>毎週月曜日<rt>まいしゅうげつようび</rt></ruby>","<ruby>毎朝<rt>まいあさ</rt></ruby>"]},
    {w:"on Mondays", a:"<ruby>毎週月曜日<rt>まいしゅうげつようび</rt></ruby>に", c:["<ruby>月曜<rt>げつよう</rt></ruby>の夜に","<ruby>今週<rt>こんしゅう</rt></ruby>の月曜","<ruby>毎週火曜日<rt>まいしゅうかようび</rt></ruby>に"]},
    {w:"every Monday", a:"<ruby>毎週月曜日<rt>まいしゅうげつようび</rt></ruby>", c:["<ruby>月曜日<rt>げつようび</rt></ruby>の午後","<ruby>毎日<rt>まいにち</rt></ruby>","<ruby>毎週木曜日<rt>まいしゅうもくようび</rt></ruby>"]},
    {w:"on Fridays", a:"<ruby>毎週金曜日<rt>まいしゅうきんようび</rt></ruby>に", c:["<ruby>次の金曜<rt>つぎのきんよう</rt></ruby>","<ruby>毎週木曜日<rt>まいしゅうもくようび</rt></ruby>に","金曜の昼に"]},
    {w:"every Friday", a:"<ruby>毎週金曜日<rt>まいしゅうきんようび</rt></ruby>", c:["金曜のテスト","<ruby>毎日<rt>まいにち</rt></ruby>","<ruby>毎週土曜日<rt>まいしゅうどようび</rt></ruby>"]},
    {w:"on weekends", a:"<ruby>週末<rt>しゅうまつ</rt></ruby>に", c:["<ruby>平日<rt>へいじつ</rt></ruby>に","<ruby>来週<rt>らいしゅう</rt></ruby>に","<ruby>毎週土曜日<rt>まいしゅうどようび</rt></ruby>に"]},
    {w:"every weekend", a:"<ruby>毎週末<rt>まいしゅうまつ</rt></ruby>", c:["<ruby>先週末<rt>せんしゅうまつ</rt></ruby>","<ruby>来週末<rt>らいしゅうまつ</rt></ruby>","<ruby>いつか<rt>いつか</rt></ruby>の週末"]},
    {w:"in the morning", a:"<ruby>午前中<rt>ごぜんちゅう</rt></ruby>に", c:["<ruby>毎朝<rt>まいあさ</rt></ruby>","<ruby>正午<rt>しょうご</rt></ruby>に","明日あしたの朝"]},
    {w:"every morning", a:"<ruby>毎朝<rt>まいあさ</rt></ruby>", c:["<ruby>毎日<rt>まいにち</rt></ruby>","今日の朝","朝ごはん"]},
    {w:"in the afternoon", a:"<ruby>午後<rt>ごご</rt></ruby>に", c:["昼休み","夕方ゆうがた","夜よる"]},
    {w:"in the evening", a:"<ruby>夕方<rt>ゆうがた</rt></ruby>に", c:["夜遅おそくに","午後ごごに","真夜中まよなかに"]},
    {w:"at night", a:"<ruby>夜<rt>よる</rt></ruby>に", c:["夕方ゆうがたに","午後ごごに","朝あさに"]},
    {w:"after school", a:"<ruby>放課後<rt>ほうかご</rt></ruby>に", c:["学校へ行く前に","授業中に","夜に"]},
    {w:"before dinner", a:"<ruby>夕食<rt>ゆうしょく</rt></ruby>の前に", c:["夕食のあとに","昼食のあとに","寝る前に"]}
];

const part2Data = [
    {w:"現在形は、どういう時に使うのが正しい？", a:"習慣や、いつも決まっていること", c:["いま、目の前でしていること","これからしようと思っていること","昔したこと"]},
    {w:"I と一緒に使う動詞、正しい「現在形」はどれ？", a:"I play", c:["I plays","I am play","I playing"]},
    {w:"He と一緒に使う動詞、正しい「現在形」はどれ？", a:"He plays", c:["He play","He is play","He playing"]},
    {w:"「毎日」や「いつも」を表す言葉は、文のどこに置くことが多い？", a:"文の最後や、動詞の前", c:["文の最初だけ","どこでも良い","名詞の後ろだけ"]},
    {w:"「夜に」を英語で言うとどれ？", a:"at night", c:["in the night","on night","to night"]},
    {w:"every Sunday と同じ意味のフレーズはどれ？", a:"on Sundays", c:["on Sunday","in Sundays","at Sundays"]},
    {w:"「every」の後ろに来る単語、正しい形はどれ？", a:"every Monday (単数)", c:["every Mondays (複数)","on every Monday","in every Monday"]},
    {w:"ふだんの習慣（現在形）の文で、いっしょに使わないものはどれ？", a:"next Sunday (次の日曜日)", c:["usually (たいてい)","on Sundays (毎週日曜日)","always (いつも)"]}
];

function startQuiz(part) {
    currentPart = part;
    currentIndex = 0;
    firstTryCorrectCount = 0;
    mistakes = [];
    quizQueue = [...(part === 1 ? part1Data : part2Data)].sort(() => Math.random() - 0.5);
    
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('main-title').textContent = part === 1 ? "Part 1：ことば編" : "Part 2：ルール編";
    
    loadQuestion();
}

function loadQuestion() {
    const current = quizQueue[currentIndex];
    const wordDisplay = document.getElementById('word-text');
    document.getElementById('progress').textContent = `${currentIndex + 1} / ${quizQueue.length}`;
    
    wordDisplay.className = currentPart === 1 ? 'word-display-p1' : 'word-display-p2';
    wordDisplay.textContent = current.w;
    document.getElementById('feedback').textContent = "";
    
    const speaker = document.getElementById('speaker-btn');
    speaker.style.visibility = currentPart === 1 ? "visible" : "hidden";

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    isFirstTry = true;

    const choices = [current.a, ...current.c].sort(() => Math.random() - 0.5);
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = `choice-btn-base ${currentPart === 1 ? 'choice-btn-p1' : 'choice-btn-p2'}`;
        btn.innerHTML = choice;
        btn.onclick = () => checkAnswer(choice, current.a, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(selected, correct, btn) {
    if (selected === correct) {
        if (isFirstTry) firstTryCorrectCount++;
        document.getElementById('feedback').style.color = "var(--success-green)";
        document.getElementById('feedback').textContent = "Excellent! ✨";
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < quizQueue.length) loadQuestion(); else showResult();
        }, 600);
    } else {
        if (isFirstTry) {
            mistakes.push({w: quizQueue[currentIndex].w, a: quizQueue[currentIndex].a});
            isFirstTry = false;
        }
        btn.classList.add('wrong');
        document.getElementById('feedback').style.color = "var(--error-red)";
        document.getElementById('feedback').textContent = "Try again!";
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-title').textContent = `Part ${currentPart} 終了！`;
    document.getElementById('final-score').textContent = firstTryCorrectCount;
    document.getElementById('total-questions').textContent = quizQueue.length;
    
    if (mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        document.getElementById('mistake-list').innerHTML = mistakes.map(m => `
            <div class="mistake-item"><strong>${m.w}</strong><span>${m.a}</span></div>
        `).join('');
    } else {
        document.getElementById('mistake-container').style.display = 'none';
    }
}

function sendEmail() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = encodeURIComponent(`現在形 Part ${currentPart} 学習結果`);
    const cleanMistakes = mistakes.map(m => {
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = m.a;
        return `・${m.w} (${tempDiv.textContent || tempDiv.innerText})`;
    }).join("\n");

    let mistakeText = mistakes.length > 0 ? "\n\n■要復習:\n" + cleanMistakes : "\n\n満点でした！完璧です！";
    const body = encodeURIComponent(`Tamaki先生へ\n\n「現在形 Part ${currentPart}」のトレーニングを完了しました！\n\n結果: ${quizQueue.length}問中 ${firstTryCorrectCount} 問を一発正解。${mistakeText}`);
    window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
}

function speakCurrentWord() {
    const txt = document.getElementById('word-text').textContent;
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = "en-US"; u.rate = 0.8;
    const voices = window.speechSynthesis.getVoices();
    const fv = voices.find(v => v.name.includes("Google US English") || v.name.includes("Female") || v.name.includes("Zira"));
    if (fv) u.voice = fv;
    window.speechSynthesis.speak(u);
}
</script>
</body>
</html>
