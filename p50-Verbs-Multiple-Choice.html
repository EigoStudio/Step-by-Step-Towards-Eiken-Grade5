<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p50 Verb + Preposition Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fff9f0;
    --text-color: #263238;
    --card-bg: #ffffff;
    --accent-orange: #ff9800; /* 動詞用 */
    --accent-brown: #795548;  /* 前置詞用 */
    --accent-green: #2e7d32;
    --main-font: "Zen Maru Gothic", sans-serif;
  }

  * { font-family: var(--main-font); box-sizing: border-box; }
  body { background-color: var(--bg-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

  #excellentPopup {
    position: fixed; top: 20px; right: -200px; background-color: #ffca28; color: #5d4037;
    padding: 10px 25px; border-radius: 50px; font-weight: bold; font-size: 1.5rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: right 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
  }
  #excellentPopup.show { right: 20px; }

  .header-area {
    display: flex; align-items: center; justify-content: center;
    width: 100%; max-width: 1000px; margin-bottom: 10px; gap: 20px;
  }

  .illustration-container {
    background-color: white; padding: 5px; border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 150px;
  }
  .illustration-placeholder { width: 100%; height: auto; border-radius: 10px; object-fit: contain; display: block; }

  .title-wrapper h2 { color: var(--text-color); font-size: 1.2rem; margin: 0; border-bottom: 3px dashed var(--accent-orange); }

  .container {
    background: var(--card-bg); width: 100%; max-width: 1000px;
    padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center; border: 3px solid #fff;
  }

  .question-box {
    font-size: 1.4rem; font-weight: bold; margin-bottom: 15px;
    background-color: #fffde7; border-radius: 12px; padding: 15px;
    border: 2px solid #fff59d; line-height: 1.8;
  }

  /* 穴あき部分のスタイル */
  .blank-v { color: var(--accent-orange); border: 2px solid var(--accent-orange); padding: 2px 10px; border-radius: 5px; background: white; margin: 0 5px; }
  .blank-p { color: var(--accent-brown); border: 2px solid var(--accent-brown); padding: 2px 10px; border-radius: 5px; background: white; margin: 0 5px; }

  .speaker-icon { display: inline-block; cursor: pointer; font-size: 1.2rem; background: none; border: none; visibility: hidden; margin-left: 5px; }

  /* 選択肢セクション */
  .selection-label { font-size: 1rem; font-weight: bold; margin-bottom: 5px; display: block; }
  .choices-section { margin-bottom: 15px; padding: 10px; border-radius: 10px; background: #fdfdfd; }
  .choices-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

  .choice-btn {
    background-color: white; padding: 8px 15px; border-radius: 10px;
    font-size: 1rem; cursor: pointer; font-weight: bold; transition: all 0.2s;
  }
  /* 動詞ボタン */
  .btn-v { border: 2px solid var(--accent-orange); color: var(--accent-orange); }
  .btn-v.selected { background-color: var(--accent-orange); color: white; }
  /* 前置詞ボタン */
  .btn-p { border: 2px solid var(--accent-brown); color: var(--accent-brown); }
  .btn-p.selected { background-color: var(--accent-brown); color: white; }

  .correct-choice { background-color: var(--accent-green) !important; color: white !important; border-color: var(--accent-green) !important; }
  .wrong-choice { background-color: #d32f2f !important; color: white !important; border-color: #b71c1c !important; }

  .controls { display: flex; justify-content: center; gap: 15px; }
  .action-btn {
    padding: 10px 40px; font-size: 1.2rem; background-color: var(--accent-green);
    color: white; border: none; border-radius: 30px; cursor: pointer;
    box-shadow: 0 4px 0 #1b5e20; font-weight: bold;
  }

  .bottom-nav { display: flex; gap: 15px; margin-top: 15px; }
  .nav-btn { color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

  @media (min-width: 600px) {
    .illustration-container { width: 280px; } 
    .title-wrapper h2 { font-size: 2rem; }
    .question-box { font-size: 1.8rem; }
    .choice-btn { font-size: 1.3rem; padding: 10px 25px; }
  }

  @media print {
    body * { visibility: hidden; }
    #printable-sheet, #printable-sheet * { visibility: visible; }
    #printable-sheet { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
  }
</style>
</head>
<body>

<div id="excellentPopup">Excellent! ✨</div>

<div class="header-area">
  <div class="illustration-container">
    <img id="headerImage" src="" class="illustration-placeholder" alt="VerbImg">
  </div>
  <div class="title-wrapper">
    <h2 id="pageTitle">p50 Verb + Preposition</h2>
    <div id="questionNum" style="color: var(--accent-orange); font-weight: bold; margin-top: 5px;">Q 1/16</div>
  </div>
</div>

<div class="container">
  <div class="question-box" id="questionDisplay">
    </div>

  <div class="choices-section">
    <span class="selection-label" style="color: var(--accent-orange);">● Choose a Verb</span>
    <div class="choices-grid" id="verbGrid"></div>
  </div>

  <div class="choices-section">
    <span class="selection-label" style="color: var(--accent-brown);">● Choose a Preposition</span>
    <div class="choices-grid" id="prepGrid"></div>
  </div>

  <div class="controls">
    <button class="action-btn" id="checkBtn" onclick="checkAnswer()">答え合わせ</button>
    <button class="action-btn" id="nextBtn" onclick="nextQuestion()" style="display:none; background-color: #ff9800; box-shadow: 0 4px 0 #e65100;">次へ進む ➔</button>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" style="background-color: var(--accent-green);" onclick="restartQuiz()">最初から</button>
</div>

<script>
  const quizData = [
    { q: "I (  V  ) (  P  ) school every day.", v: "walk", p: "to", vOpt: ["walk", "swim", "fly", "sleep"], pOpt: ["to", "in", "on", "at"], img: "walk-to.jpg" },
    { q: "She is (  V  ) (  P  ) the bus.", v: "waiting", p: "for", vOpt: ["waiting", "talking", "looking", "running"], pOpt: ["for", "at", "to", "with"], img: "wait-for.jpg" },
    { q: "He (  V  ) (  P  ) the park.", v: "runs", p: "in", vOpt: ["runs", "flies", "skates", "smiles"], pOpt: ["in", "on", "over", "at"], img: "run-in.jpg" },
    { q: "She is (  V  ) (  P  ) the phone.", v: "talking", p: "on", vOpt: ["talking", "listening", "dancing", "working"], pOpt: ["on", "with", "to", "for"], img: "talk-on.jpg" },
    { q: "He (  V  ) (  P  ) the office.", v: "works", p: "at", vOpt: ["works", "lives", "swims", "goes"], pOpt: ["at", "for", "over", "with"], img: "work-at.jpg" },
    { q: "They are (  V  )ing (  P  ) the stars.", v: "look", p: "at", vOpt: ["look", "listen", "wait", "walk"], pOpt: ["at", "to", "for", "on"], img: "look-at.jpg" },
    { q: "He is (  V  ) (  P  ) music in his room.", v: "listening", p: "to", vOpt: ["listening", "talking", "looking", "smiling"], pOpt: ["to", "at", "with", "for"], img: "listen-to.jpg" },
    { q: "The birds are (  V  ) (  P  ) the river.", v: "flying", p: "over", vOpt: ["flying", "running", "walking", "talking"], pOpt: ["over", "on", "at", "to"], img: "fly-over.jpg" },
    { q: "She is (  V  ) (  P  ) the pool.", v: "swimming", p: "in", vOpt: ["swimming", "skating", "dancing", "living"], pOpt: ["in", "on", "with", "over"], img: "swim-in.jpg" },
    { q: "She often (  V  ) (  P  ) winter.", v: "skates", p: "in", vOpt: ["skates", "runs", "swims", "walks"], pOpt: ["on", "in", "at", "to"], img: "skate-on.jpg" },
    { q: "I (  V  ) (  P  ) my friends.", v: "dance", p: "with", vOpt: ["dance", "talk", "work", "wait"], pOpt: ["with", "for", "to", "on"], img: "dance-with.jpg" },
    { q: "The cat (  V  ) (  P  ) night.", v: "sleeps", p: "at", vOpt: ["sleeps", "smiles", "lives", "works"], pOpt: ["at", "in", "on", "for"], img: "sleep-at.jpg" },
    { q: "She (  V  ) (  P  ) everyone.", v: "smiles", p: "at", vOpt: ["smiles", "looks", "talks", "listens"], pOpt: ["at", "on", "with", "over"], img: "smile-at.jpg" },
    { q: "He often (  V  ) (  P  ) the library.", v: "goes", p: "to", vOpt: ["goes", "looks", "listens", "smiles"], pOpt: ["to", "at", "in", "on"], img: "go-to.jpg" },
    { q: "My father sometimes (  V  ) (  P  ) late.", v: "comes", p: "home", vOpt: ["comes", "goes", "works", "lives"], pOpt: ["home", "to", "at", "in"], img: "come-home.jpg" },
    { q: "They (  V  ) (  P  ) Tokyo.", v: "live", p: "in", vOpt: ["live", "work", "sleep", "go"], pOpt: ["in", "at", "on", "to"], img: "live-in.jpg" }
  ];

  let currentIdx = 0;
  let selectedV = null;
  let selectedP = null;
  let shuffledData = [];

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function restartQuiz() {
    currentIdx = 0;
    shuffledData = shuffle([...quizData]);
    loadQuestion();
  }

  function loadQuestion() {
    const data = shuffledData[currentIdx];
    selectedV = null;
    selectedP = null;
    
    document.getElementById('headerImage').src = "images-p50-verbs/" + data.img;
    document.getElementById('questionNum').textContent = `Q ${currentIdx + 1} / ${shuffledData.length}`;
    document.getElementById('checkBtn').style.display = "block";
    document.getElementById('nextBtn').style.display = "none";
    
    updateQuestionDisplay();

    // Verb choices
    const vGrid = document.getElementById('verbGrid');
    vGrid.innerHTML = "";
    shuffle([...data.vOpt]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = "choice-btn btn-v";
      btn.textContent = opt;
      btn.onclick = () => {
        if(document.getElementById('nextBtn').style.display === "block") return;
        document.querySelectorAll('.btn-v').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedV = opt;
        updateQuestionDisplay();
      };
      vGrid.appendChild(btn);
    });

    // Prep choices
    const pGrid = document.getElementById('prepGrid');
    pGrid.innerHTML = "";
    shuffle([...data.pOpt]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = "choice-btn btn-p";
      btn.textContent = opt;
      btn.onclick = () => {
        if(document.getElementById('nextBtn').style.display === "block") return;
        document.querySelectorAll('.btn-p').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedP = opt;
        updateQuestionDisplay();
      };
      pGrid.appendChild(btn);
    });
  }

  function updateQuestionDisplay() {
    const data = shuffledData[currentIdx];
    const vText = selectedV ? selectedV : " &nbsp;?&nbsp; ";
    const pText = selectedP ? selectedP : " &nbsp;?&nbsp; ";
    
    let html = data.q.replace("(  V  )", `<span class="blank-v">${vText}</span>`);
    html = html.replace("(  P  )", `<span class="blank-p">${pText}</span>`);
    
    document.getElementById('questionDisplay').innerHTML = `
      ${html}
      <button id="speakBtn" class="speaker-icon" onclick="speakCurrentSentence()">🔊</button>
    `;
  }

  function checkAnswer() {
    if (!selectedV || !selectedP) { alert("動詞と前置詞の両方を選んでね！"); return; }
    
    const data = shuffledData[currentIdx];
    const isVCorrect = (selectedV === data.v);
    const isPCorrect = (selectedP === data.p);

    if (isVCorrect && isPCorrect) {
      document.querySelector('.btn-v.selected').classList.add('correct-choice');
      document.querySelector('.btn-p.selected').classList.add('correct-choice');
      document.getElementById('checkBtn').style.display = "none";
      document.getElementById('nextBtn').style.display = "block";
      document.getElementById('speakBtn').style.visibility = "visible";
      
      const popup = document.getElementById('excellentPopup');
      popup.classList.add('show');
      setTimeout(() => popup.classList.remove('show'), 1500);
    } else {
      if(!isVCorrect) document.querySelector('.btn-v.selected').classList.add('wrong-choice');
      if(!isPCorrect) document.querySelector('.btn-p.selected').classList.add('wrong-choice');
    }
  }

  function speakCurrentSentence() {
    const data = shuffledData[currentIdx];
    const text = data.q.replace("(  V  )", data.v).replace("(  P  )", data.p);
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "en-US";
    uttr.rate = 0.8;
    speechSynthesis.speak(uttr);
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < shuffledData.length) loadQuestion();
    else {
      document.querySelector('.container').innerHTML = "<h2>🎉 Perfect Clear!</h2><button class='action-btn' onclick='location.reload()'>最初から</button>";
    }
  }

  restartQuiz();
</script>
</body>
</html>
