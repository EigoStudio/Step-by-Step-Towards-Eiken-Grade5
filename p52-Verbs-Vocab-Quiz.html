<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Step by Step Towards EIKEN Grade 5 p52 Verbs</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f8e9; /* 薄い緑 */
            --header-gray: #455a64; /* 濃いグレー */
            --accent-yellow: #fdd835; /* 黄色 */
            --text-dark: #263238;
            --white: #ffffff;
            --error-red: #ff5252;
            --success-green: #4caf50;
            --base-font: 'Andika', "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
        }

        body {
            font-family: var(--base-font);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-gray);
            color: var(--white);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 20px 0;
            background: var(--white);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
            border: 5px solid var(--accent-yellow);
        }

        .progress-bar { font-size: 1.1rem; color: var(--header-gray); margin-bottom: 15px; font-weight: bold; }
        
        .word-display { 
            font-size: 4.5rem; 
            font-weight: 700; 
            color: var(--header-gray); 
            margin: 10px 0 30px 0; 
            letter-spacing: 2px;
        }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .choice-btn {
            background: var(--white);
            border: 3px solid var(--header-gray);
            border-radius: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--header-gray);
            font-family: var(--base-font);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        ruby {
            ruby-position: over;
        }

        rt {
            font-size: 0.55em;
            font-weight: normal;
            color: #546e7a;
        }

        .choice-btn:hover { background-color: #eceff1; transform: scale(1.02); }
        .choice-btn.wrong { background-color: #ffebee; border-color: var(--error-red); color: var(--error-red); animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        #result-screen { display: none; }
        .score-num { font-size: 4rem; color: var(--header-gray); font-weight: 700; }
        .mistake-list { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #cfd8dc; }
        .mistake-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }

        .action-btn { 
            background-color: var(--header-gray); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 40px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
            font-family: var(--base-font);
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.5rem;">Step by Step Towards EIKEN Grade 5 p52 Verbs</h1>
</header>

<div class="container" id="quiz-screen">
    <div class="progress-bar" id="progress">1 / 16</div>
    <div class="word-display" id="word-text">Loading...</div>
    <div class="choices-grid" id="choices-container"></div>
    <div id="feedback" style="margin-top:20px; height: 1.2em; font-weight: bold; font-size: 1.3rem;"></div>
</div>

<div class="container" id="result-screen">
    <h2 style="font-size: 1.8rem;">トレーニング終了！</h2>
    <div style="font-size: 1.2rem;">正解数：<span class="score-num" id="final-score">0</span> / 16</div>
    <div id="mistake-container" style="display:none;">
        <h3 style="color: var(--header-gray); margin-top:25px;">もういちど 確認しよう！</h3>
        <div class="mistake-list" id="mistake-list"></div>
    </div>
    <button class="action-btn" onclick="sendEmail()">Tamaki先生に報告する</button>
    <button class="action-btn" style="background-color: #90a4ae;" onclick="location.reload()">もう一度やる</button>
</div>

<script>

// 1. 音声読み上げ関数
function speak(txt, rate = 0.7) {
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = "en-US"; 
    u.rate = rate;
    window.speechSynthesis.speak(u);
}

const quizData = [
    {w:"cook", a:"<ruby>料理<rt>りょうり</rt></ruby>する", c:["<ruby>食<rt>た</rt></ruby>べる","<ruby>洗<rt>あら</rt></ruby>う","<ruby>買<rt>か</rt></ruby>う"]},
    {w:"draw", a:"<ruby>描<rt>か</rt></ruby>く", c:["<ruby>歌<rt>うた</rt></ruby>う","<ruby>踊<rt>おど</rt></ruby>る","<ruby>消<rt>け</rt></ruby>す"]},
    {w:"drink", a:"<ruby>飲<rt>の</rt></ruby>む", c:["<ruby>食<rt>た</rt></ruby>べる","<ruby>作<rt>つく</rt></ruby>る","<ruby>噛<rt>か</rt></ruby>む"]},
    {w:"eat", a:"<ruby>食<rt>た</rt></ruby>べる", c:["<ruby>飲<rt>の</rt></ruby>む","<ruby>買<rt>か</rt></ruby>う","<ruby>売<rt>う</rt></ruby>る"]},
    {w:"have", a:"<ruby>持<rt>も</rt></ruby>っている", c:["<ruby>捨<rt>す</rt></ruby>てる","<ruby>失<rt>うしな</rt></ruby>う","あげる"]},
    {w:"learn", a:"<ruby>学<rt>まな</rt></ruby>ぶ", c:["<ruby>教<rt>おし</rt></ruby>える","<ruby>忘<rt>わす</rt></ruby>れる","<ruby>遊<rt>あそ</rt></ruby>ぶ"]},
    {w:"meet", a:"<ruby>会<rt>あ</rt></ruby>う", c:["<ruby>別<rt>わか</rt></ruby>れる","さよならする","<ruby>待<rt>ま</rt></ruby>つ"]},
    {w:"open", a:"<ruby>開<rt>あ</rt></ruby>ける", c:["<ruby>閉<rt>し</rt></ruby>める","<ruby>壊<rt>こわ</rt></ruby>す","たたく"]},
    {w:"play", a:"<ruby>遊<rt>あそ</rt></ruby>ぶ", c:["<ruby>働<rt>はたら</rt></ruby>く","<ruby>勉強<rt>べんきょう</rt></ruby>する","<ruby>眠<rt>ねむ</rt></ruby>る"]},
    {w:"ride", a:"<ruby>乗<rt>の</rt></ruby>る", c:["<ruby>降<rt>お</rt></ruby>りる","<ruby>歩<rt>ある</rt></ruby>く","<ruby>走<rt>はし</rt></ruby>る"]},
    {w:"speak", a:"<ruby>話<rt>はな</rt></ruby>す", c:["<ruby>聞<rt>き</rt></ruby>く","<ruby>黙<rt>だま</rt></ruby>る","<ruby>叫<rt>さけ</rt></ruby>ぶ"]},
    {w:"study", a:"<ruby>勉強<rt>べんきょう</rt></ruby>する", c:["<ruby>遊<rt>あそ</rt></ruby>ぶ","<ruby>休<rt>やす</rt></ruby>む","<ruby>忘<rt>わす</rt></ruby>れる"]},
    {w:"teach", a:"<ruby>教<rt>おし</rt></ruby>える", c:["<ruby>学<rt>まな</rt></ruby>ぶ","<ruby>問<rt>と</rt></ruby>う","<ruby>隠<rt>かく</rt></ruby>す"]},
    {w:"wash", a:"<ruby>洗<rt>あら</rt></ruby>う", c:["<ruby>汚<rt>よご</rt></ruby>す","<ruby>拭<rt>ふ</rt></ruby>く","みがく"]},
    {w:"watch", a:"<ruby>見<rt>み</rt></ruby>る", c:["<ruby>聞<rt>き</rt></ruby>く","<ruby>触<rt>ふ</rt></ruby>れる","<ruby>嗅<rt>か</rt></ruby>ぐ"]},
    {w:"write", a:"<ruby>書<rt>か</rt></ruby>く", c:["<ruby>読<rt>よ</rt></ruby>む","<ruby>消<rt>け</rt></ruby>す","なぞる"]}
];

let quizQueue = [...quizData].sort(() => Math.random() - 0.5);
let currentIndex = 0;
let firstTryCorrectCount = 0;
let isFirstTry = true;
let mistakes = [];

function loadQuestion() {
    const current = quizQueue[currentIndex];
    document.getElementById('progress').textContent = `${currentIndex + 1} / ${quizQueue.length}`;
    document.getElementById('word-text').textContent = current.w;
    document.getElementById('feedback').textContent = "";

// 2. 問題を読み上げる
    speak(current.w);
    
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    isFirstTry = true;

    const choices = [current.a, ...current.c].sort(() => Math.random() - 0.5);

    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice;
        btn.onclick = () => checkAnswer(choice, current.a, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(selected, correct, btn) {
    if (selected === correct) {
        if (isFirstTry) { firstTryCorrectCount++; }
        document.getElementById('feedback').style.color = "var(--success-green)";
        document.getElementById('feedback').textContent = "Excellent! ✨";
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < quizQueue.length) { loadQuestion(); } else { showResult(); }
        }, 600);
    } else {
        if (isFirstTry) {
            mistakes.push({w: quizQueue[currentIndex].w, a: quizQueue[currentIndex].a});
            isFirstTry = false;
        }
        btn.classList.add('wrong');
        document.getElementById('feedback').style.color = "var(--error-red)";
        document.getElementById('feedback').textContent = "Try again!";
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').textContent = firstTryCorrectCount;
    if (mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        document.getElementById('mistake-list').innerHTML = mistakes.map(m => `
            <div class="mistake-item"><strong>${m.w}</strong><span>${m.a}</span></div>
        `).join('');
    }
}

// 3. 最初にクイズを読み込む実行命令を追加！
loadQuestion();

function sendEmail() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = encodeURIComponent("パス単5級 p52 Verbs 学習結果");
    const cleanMistakes = mistakes.map(m => `・${m.w} (${m.a.replace(/<[^>]*>?/gm, '')})`).join("\n");
    let mistakeText = mistakes.length > 0 ? "\n\n■要復習リスト:\n" + cleanMistakes : "\n\nすべて一発正解でした！すばらしい！";
    const body = encodeURIComponent(`Tamaki先生へ\n\n「Step by Step Towards EIKEN Grade 5 p52 Verbs」のトレーニングを完了しました！\n\n結果: ${quizQueue.length}問中 ${firstTryCorrectCount} 問を一発正解。${mistakeText}`);
    window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
}

window.onload = loadQuestion;
</script>
</body>
</html>
