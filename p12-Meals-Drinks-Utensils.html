<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p12 Meals / Drinks / Utensils</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --bg-color: #fff9c4;
    --text-color: #4e342e;
    --card-bg: #ffffff;
    --accent-orange: #ff9800;
    --accent-brown: #795548;
    --accent-blue: #0288d1;
    --accent-purple: #673ab7;
    --main-font: "Zen Maru Gothic", sans-serif;
  }

  * { font-family: var(--main-font); box-sizing: border-box; }
  body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

  .header-area { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; width: 100%; max-width: 800px; }
  .header-area h2 { border-bottom: 4px dashed var(--accent-orange); padding-bottom: 2px; margin: 0; font-size: 1.4rem; }

  .container { background: var(--card-bg); width: 100%; max-width: 800px; padding: 15px 20px; border-radius: 20px; box-shadow: 0 6px 15px rgba(78, 52, 46, 0.15); text-align: center; border: 4px solid #fff; position: relative; }
  #resultMsg { position: absolute; top: 10px; right: 15px; font-weight: bold; font-size: 1.1rem; padding: 3px 10px; border-radius: 8px; z-index: 10; }

  .question-box { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; background-color: #fffde7; border-radius: 12px; padding: 15px; border: 3px solid #fff9c4; min-height: 100px; line-height: 1.6; text-align: left; white-space: pre-wrap; }
  .illustration-placeholder {
    width: 100%;
    max-width: 350px; /* 横幅の最大値はそのまま */
    height: 250px;    /* ★縦幅を250pxに固定します */
    border-radius: 12px;
    display: none;    /* 最初は非表示 */
    margin: 0 auto 15px; /* 中央寄せ */
    border: 2px solid #eee; /* 薄いグレーの枠線 */
    
    /* ★追加: 画像が枠内で歪まないように調整するプロパティです */
    object-fit: contain; 
    /* contain: 画像全体が枠内に収まるように、比率を保ったまま縮小します。
       余白ができる場合がありますが、画像が切れることはありません。 */
  }

  .choices-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
  .choice-btn { background-color: white; border: 2px solid var(--accent-orange); padding: 10px 15px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; min-width: 140px; }
  .choice-btn.selected { background-color: var(--accent-orange); color: white; }
  .choice-btn.correct-choice { background-color: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
  .choice-btn.wrong-choice { background-color: #f44336 !important; color: white !important; border-color: #d32f2f !important; }

  .button-row { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
  .action-btn { padding: 10px 25px; font-size: 1.1rem; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
  #checkBtn { background-color: #4caf50; box-shadow: 0 3px 0 #2e7d32; }
  #nextBtn { background-color: #ff9800; box-shadow: 0 3px 0 #e65100; }
  #hintBtn { background-color: var(--accent-blue); box-shadow: 0 3px 0 #01579b; font-size: 0.9rem; }
  #speakBtn { background-color: var(--accent-purple); box-shadow: 0 3px 0 #4527a0; }

  .reset-link { margin-top: 20px; font-size: 0.85rem; color: var(--accent-brown); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="header-area">
  <button id="hintBtn" class="action-btn" onclick="showHint()">💡 ヒント</button>
  <div class="title-wrapper">
    <h2 id="pageTitle">p12 Meals / Drinks / Utensils</h2>
  </div>
</div>

<div class="container">
  <div id="resultMsg"></div>
  <div id="questionNum" style="text-align: left; font-weight: bold; color: var(--accent-brown); font-size: 0.9rem; margin-bottom: 5px;">Question</div>
  
  <div class="question-box" id="questionText">Loading...</div>
  <img id="headerImage" src="" class="illustration-placeholder" alt="HintImg">
  <div class="choices-grid" id="choicesGrid"></div>
  
  <div class="button-row">
    <button class="action-btn" id="checkBtn" onclick="checkAnswer()">答え合わせ</button>
    <button class="action-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">次へ進む ➔</button>
    <button id="speakBtn" class="action-btn" onclick="speakCurrentSentence()" style="display:none;">🔊 読み上げ</button>
  </div>

  <div class="reset-link" onclick="location.reload()">問題を入れ替えて最初から</div>
</div>

<script>
  const allData = [
    { q: "A: What do you want for (      )?\nB: I want some toast and eggs.", a: "breakfast", options: ["breakfast", "lunch", "salt", "cup"], img: "images-p12-meals/breakfast.jpg" },
    { q: "A: Pass me the (      ), please.\nB: Here you are. Be careful, it's hot.", a: "coffee", options: ["coffee", "juice", "plate", "spoon"], img: "images-p12-meals/coffee.jpg" },
    { q: "I'm thirsty. Can I have a (      ) of water?", a: "glass", options: ["glass", "plate", "fork", "lunch"], img: "images-p12-meals/glass.jpg" },
    { q: "A: Let's have (      ) at 7 o'clock.\nB: OK, Mom. I'm very hungry!", a: "dinner", options: ["dinner", "lunch", "sugar", "tea"], img: "images-p12-meals/dinner.jpg" },
    { q: "Japanese people use (      ) to eat ramen.", a: "chopsticks", options: ["chopsticks", "forks", "spoons", "plates"], img: "images-p12-meals/chopsticks.jpg" },
    { q: "A: Do you want some (      ) in your tea?\nB: Yes, two spoons, please.", a: "sugar", options: ["sugar", "salt", "pepper", "milk"], img: "images-p12-meals/sugar.jpg" },
    { q: "A: What's for (      ) today?\nB: We have sandwiches and apples.", a: "lunch", options: ["lunch", "water", "cup", "fork"], img: "images-p12-meals/lunch.jpg" },
    { q: "Put the cake on that small (      ).", a: "plate", options: ["plate", "glass", "cup", "juice"], img: "images-p12-meals/plate.jpg" },
    { q: "A: Can I have some (      )?\nB: Yes. Do you want it cold or hot?", a: "milk", options: ["milk", "salt", "fork", "plate"], img: "images-p12-meals/milk.jpg" },
    { q: "I eat soup with a (      ).", a: "spoon", options: ["spoon", "fork", "chopsticks", "glass"], img: "images-p12-meals/spoon.jpg" },
    { q: "A: This soup is a bit bland.\n(※bland: 味がうすい)\nB: Use some (      ) and pepper.", a: "salt", options: ["salt", "sugar", "juice", "coffee"], img: "images-p12-meals/salt.jpg" },
    { q: "I like orange (      ). It's sweet.", a: "juice", options: ["juice", "tea", "water", "salt"], img: "images-p12-meals/juice.jpg" },
    { q: "A: Do you want a (      ) of tea?\nB: Yes, please.", a: "cup", options: ["cup", "plate", "spoon", "fork"], img: "images-p12-meals/cup.jpg" },
    { q: "Eat your salad with a (      ).", a: "fork", options: ["fork", "spoon", "glass", "chopsticks"], img: "images-p12-meals/fork.jpg" },
    { q: "A: It's very hot today.\nB: Drink a lot of (      ), please.", a: "water", options: ["water", "salt", "sugar", "plate"], img: "images-p12-meals/water.jpg" },
    { q: "A: Do you want (      ) or coffee?\nB: (      ), please. I like green tea very much.", a: "tea", options: ["tea", "salt", "pepper", "plate"], img: "images-p12-meals/tea.jpg" },
    { q: "A: This spaghetti is good, but I want it more spicy.\nB: OK. Use some (      ).", a: "pepper", options: ["pepper", "sugar", "milk", "glass"], img: "images-p12-meals/pepper.jpg" }
  ];

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  let quizData = shuffle([...allData]).slice(0, 10);
  let currentIdx = 0;
  let selectedOption = null;

  function loadQuestion() {
    const data = quizData[currentIdx];
    document.getElementById('questionText').textContent = data.q;
    document.getElementById('headerImage').src = data.img;
    document.getElementById('headerImage').style.display = "none";
    document.getElementById('hintBtn').style.display = "inline-block";
    document.getElementById('questionNum').textContent = `Question ${currentIdx + 1} / 10`;
    
    const grid = document.getElementById('choicesGrid');
    grid.innerHTML = "";
    selectedOption = null;
    document.getElementById('resultMsg').textContent = "";
    document.getElementById('resultMsg').style.backgroundColor = "transparent";
    document.getElementById('checkBtn').style.display = "inline-block";
    document.getElementById('nextBtn').style.display = "none";
    document.getElementById('speakBtn').style.display = "none";

    shuffle([...data.options]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = "choice-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        if(document.getElementById('nextBtn').style.display === "inline-block") return;
        document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOption = opt;
        document.getElementById('questionText').textContent = data.q.replace("(      )", `( ${opt} )`);
      };
      grid.appendChild(btn);
    });
  }

  function showHint() {
    document.getElementById('headerImage').style.display = "block";
    document.getElementById('hintBtn').style.display = "none";
  }

  function checkAnswer() {
    if (!selectedOption) return;
    const correct = quizData[currentIdx].a;
    const msg = document.getElementById('resultMsg');
    
    if (selectedOption === correct) {
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
      document.querySelector('.choice-btn.selected').classList.add('correct-choice');
      msg.textContent = "Correct! ✨";
      msg.style.color = "white"; msg.style.backgroundColor = "#4caf50";
      
      document.getElementById('checkBtn').style.display = "none";
      document.getElementById('nextBtn').style.display = "inline-block";
      document.getElementById('speakBtn').style.display = "inline-block";
      document.getElementById('headerImage').style.display = "block";
      document.getElementById('hintBtn').style.display = "none";

      // ★ここを修正：全ての (      ) を正解の単語で置き換えます
      // / \(      \) /g という書き方で、文中の全ての空欄を探して置換します
      const fullSentence = quizData[currentIdx].q.replace(/\(      \)/g, selectedOption);
      document.getElementById('questionText').textContent = fullSentence;
      
    } else {
      document.querySelector('.choice-btn.selected').classList.add('wrong-choice');
      msg.textContent = "Try Again 🔄";
      msg.style.color = "white"; msg.style.backgroundColor = "#f44336";
    }
  }

  function speakCurrentSentence() {
    const text = document.getElementById('questionText').textContent.split('(※')[0];
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "en-US"; uttr.rate = 0.8;
    speechSynthesis.speak(uttr);
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < quizData.length) loadQuestion();
    else {
      document.querySelector('.container').innerHTML = "<h2>🎉 Awesome! 10 Questions Clear!</h2><button class='action-btn' id='checkBtn' onclick='location.reload()'>もう一度（問題をシャッフル）</button>";
    }
  }

  loadQuestion();
</script>
</body>
</html>
